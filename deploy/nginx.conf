# /etc/nginx/sites-available/electricity-trading
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # 项目根目录
    root /opt/electricity-trading/client/dist;
    index index.html;

    # ----- 日志 -----
    access_log /var/log/nginx/electricity-trading-access.log;
    error_log  /var/log/nginx/electricity-trading-error.log;

    # ----- 安全 header -----
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer" always;

    # ----- gzip -----
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 5;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml
        font/woff2;

    # ----- 静态资源（长期缓存） -----
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ----- favicon / robots 等根目录文件 -----
    location ~* ^/(favicon\.svg|robots\.txt)$ {
        expires 1d;
    }

    # ----- API 反向代理 -----
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 超时
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # ----- Socket.IO WebSocket -----
    location /socket.io/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        # WebSocket 升级
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 长连接超时（24h），防止 Nginx 断开 WebSocket
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        proxy_connect_timeout 10s;

        # 禁用缓冲
        proxy_buffering off;
    }

    # ----- SPA fallback（必须放在最后） -----
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ----- 隐藏 Nginx 版本 -----
    server_tokens off;
}
